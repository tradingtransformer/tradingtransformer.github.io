<text x="621" y="1737" text-anchor="middle" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN', sans-serif" font-weight="500" font-size="31" fill="#8a8fa3">マンガー・ジョブズ・アインシュタイン・他30名以上</text>
