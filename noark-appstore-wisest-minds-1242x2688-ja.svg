<text x="621" y="1480" text-anchor="middle" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN', sans-serif" font-weight="700" font-size="70" fill="#ffffff" letter-spacing="-0.5">歴史上の賢人たちに</text>
